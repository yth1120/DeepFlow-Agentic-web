name = "deepflow-website"
pages_build_output_dir = "./dist"
compatibility_date = "2026-06-09"

# With _worker.js mode (Astro Cloudflare adapter default),
# no separate functions directory is needed.
# Routing defined by _routes.json in dist/.

# ── Environment variables ─────────────────────────
# Secrets (SUPABASE_URL, SUPABASE_ANON_KEY) are set via:
#   npx wrangler pages secret put <NAME> --project-name=deepflow-website
# Local dev: use .dev.vars
